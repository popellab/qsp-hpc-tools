calibration_target_id: time_to_progression

observable:
  species:
    - V_T.Tumor
  units: day
  code: |
    def compute_observable(time, species_dict, constants, ureg):
        tumor = species_dict['V_T.Tumor']
        doubled = tumor >= 2 * tumor[0]
        if np.any(doubled):
            return float(time.magnitude[np.argmax(doubled)]) * ureg.day
        return float(time.magnitude[-1]) * ureg.day

empirical_data:
  median: [45.0]
  ci95: [[20.0, 90.0]]
  sample_size: 80
