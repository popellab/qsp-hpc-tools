[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    hpc: marks tests requiring real HPC connection (deselect with '-m "not hpc"')
    matlab: marks tests requiring MATLAB installation (deselect with '-m "not matlab"')
    validation: marks cross-backend numerical validation tests (requires MATLAB + C++ binary; enable with '-m validation')

# Ignore patterns
norecursedirs = .git .tox dist build *.egg

# Coverage options (if using pytest-cov)
# Uncomment these when ready to measure coverage
# addopts = --cov=qsp_hpc --cov-report=term-missing
